.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.1)}
.card .icon{font-size:32px;width:48px;text-align:center}
.card .info{flex:1}
.card .info h2{margin:0 0 4px;font-size:17px}
.card .info p{margin:0;font-size:13px;color:#6b6f78}
.card .arrow{font-size:18px;color:#6b6f78}

<style>/* Cookie Consent Banner */
.cookie-consent{position:fixed;bottom:0;left:0;width:100%;background:#1a1c20;color:#f7fafc;padding:16px 24px;z-index:9999;display:none;box-shadow:0 -4px 16px rgba(0,0,0,.3);font-size:14px;line-height:1.5}
.cookie-consent.show{display:block}
.cookie-consent .inner{max-width:800px;margin:0 auto;display:flex;flex-wrap:wrap;align-items:center;gap:12px}
.cookie-consent p{flex:1;min-width:240px;margin:0}
.cookie-consent a{color:#63b3ed;text-decoration:underline}
.cookie-consent .btn-group{display:flex;gap:8px;flex-shrink:0}
.cookie-consent .btn-acc{background:#e53e3e;color:#fff;border:none;padding:8px 20px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:600;font-family:system-ui,sans-serif;transition:background .15s}
.cookie-consent .btn-acc:hover{background:#c53030}
.cookie-consent .btn-dec{background:transparent;color:#a0aec0;border:1px solid #4a5568;padding:8px 20px;border-radius:8px;cursor:pointer;font-size:14px;font-family:system-ui,sans-serif;transition:all .15s}
.cookie-consent .btn-dec:hover{color:#f7fafc;border-color:#a0aec0}</style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-8N86J1GTZH"></script>

<body>
<div class="main">
<h1>⚡ hinfok</h1>
<div class="sub">Projects &amp; experiments</div>
<div class="grid">
<a class="card" href="https://poke.hinfok.com">
<div class="icon">🃏</div>
<div class="info"><h2>PokeVal</h2><p>Pokémon card value estimator · Search cards, adjust condition &amp; grading, get reference prices</p></div>
<div class="arrow">→</div>
</a>
<div class="add">+ More projects coming soon...</div>
</div>
</div>
<div class="footer">© 2026 hinfok</div>
<div id="cookieConsent" class="cookie-consent">
  <div class="inner">
    <p>我哋使用 cookies 同類似技術嚟提供個人化廣告同改善體驗。繼續使用即表示你同意。 <a href="https://policies.google.com/technologies/cookies" target="_blank">了解更多</a></p>
    <div class="btn-group">
      <button class="btn-dec" onclick="declineConsent()">拒絕</button>
      <button class="btn-acc" onclick="acceptConsent()">同意</button>
    </div>
  </div>
</div>
<script>
var cn = 'hinfok_consent';
function getConsent() { try { return localStorage.getItem(cn); } catch(e) { return null; } }
function setConsent(v) { try { localStorage.setItem(cn, v); } catch(e) {} }
function showConsent() { var el = document.getElementById('cookieConsent'); if(el) el.classList.add('show'); }
function hideConsent() { var el = document.getElementById('cookieConsent'); if(el) el.classList.remove('show'); }
function acceptConsent() { setConsent('accepted'); hideConsent(); }
function declineConsent() { setConsent('declined'); hideConsent(); }
(function(){ if(!getConsent()) showConsent(); })();
</script>
</body>
